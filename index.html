<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Nekomamadas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Calculadora de Nekomamadas</h1>
        <p class="subtitle">
          1 nekomamada equivale al precio de referencia de la 3DS en USD del
          año seleccionado (tabla year, price_usd).
        </p>

        <label for="amount">Monto a convertir (USD)</label>
        <input
          id="amount"
          type="number"
          min="0"
          step="0.01"
          placeholder="Ej. 99"
        />

        <label for="year">Año de referencia</label>
        <div class="year-control">
          <input id="year" type="range" min="2011" max="2025" step="1" value="2025" />
          <span id="yearValue">2025</span>
        </div>

        <div class="reference-price">
          Precio referencia 3DS: <strong id="referencePrice">$0 USD</strong>
        </div>

        <button id="convertButton" type="button">Convertir</button>

        <div class="result" id="result">
          Ingresa un monto para calcular su valor en nekomamadas.
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
