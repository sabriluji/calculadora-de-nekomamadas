<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de Nekomamadas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Calculadora de Nekomamadas</h1>
        <p class="subtitle">
          1 nekomamada equivale al precio de una Nintendo Switch en el año
          seleccionado.
        </p>

        <label for="amount">Monto a convertir (MXN)</label>
        <input
          id="amount"
          type="number"
          min="0"
          step="0.01"
          placeholder="Ej. 2500"
        />

        <label for="year">Año de referencia</label>
        <div class="year-control">
          <input id="year" type="range" min="2017" max="2026" step="1" value="2026" />
          <span id="yearValue">2026</span>
        </div>

        <div class="switch-price">
          Precio estimado Switch: <strong id="switchPrice">$0 MXN</strong>
        </div>

        <button id="convertButton" type="button">Convertir</button>

        <div class="result" id="result">
          Ingresa un monto para calcular su valor en nekomamadas.
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
